<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MarkPakito</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <video id="camera" autoplay playsinline muted></video>

  <div class="overlay">
    <img src="logo.png" class="logo">

    <div class="timemark">
      <div>PakitoMark</div>
      <small>Foto 100% Real</small>
    </div>

    <div class="info">
      <div class="hora" id="hora"></div>
      <div class="data" id="data"></div>
      <div>Operação: Florestal Suzano</div>
      <div id="gps"></div>
    </div>
  </div>

  <button id="capturar" class="btn-capture"></button>
  <button id="trocar" class="btn-switch">🔄</button>
</div>

<script src="app.js"></script>
</body>
</html>
